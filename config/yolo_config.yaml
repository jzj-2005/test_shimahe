# YOLO 模型配置

model:
  # 模型路径
  path: "./models/yolo11x-obb_1280.pt"
  
  # 模型类型
  type: "yolov11x-obb"
  
  # 推理设备 (cuda, cpu)
  device: "cuda"  # GPU模式（需要CUDA版本的PyTorch）
  
  # 是否使用半精度推理 (需要GPU支持，速度翻倍)
  half_precision: true
  
  # 是否启用 OBB 旋转框模式
  # true  → 从 result.obb 解析旋转四角点（需要 OBB 训练模型）
  # false → 使用传统 HBB 水平框（默认，兼容现有模型）
  obb_mode: true

# 检测参数
detection:
  # 置信度阈值（河岸四乱检测：提高阈值减少误检）
  confidence_threshold: 0.5
  
  # IoU阈值 (用于NMS)
  iou_threshold: 0.45
  
  # 最大检测数量
  max_detections: 300
  
  # 图像尺寸 (模型输入尺寸，正射图片建议使用更大尺寸)
  imgsz: 1280
  
  # 是否对图像进行预处理增强
  augment: false

# 目标类别 (根据训练的模型调整)
classes:
  # 如果为空，检测所有类别
  # 如果指定，只检测指定类别的ID
  target_classes: null  # null表示检测所有类别，或指定类别ID列表如: [0, 1, 2]
  
  # 类别名称映射 (根据实际训练模型调整)
  names:
    0: '无'
    1: '围垦湖泊'
    2: '非法侵占水域'
    3: '阻碍行洪作物'
    4: '未依法批准围垦河道'
    5: '围占养殖'
    6: '围网养殖'
    7: '坑塘养殖'
    8: '文体旅游项目'
    9: '耕地'
    10: '片林'
    11: '其他占用'
    12: '非法采砂'
    13: '取土取石'
    14: '在禁采区、禁采期采砂'
    15: '不按许可要求采砂'
    16: '其他开采'
    17: '弃渣（土）场'
    18: '垃圾堆放'
    19: '固体废物'
    20: '其他堆放'
    21: '弃置、堆放阻碍行洪的物体'
    22: '阻碍行洪建筑物'
    23: '未经许可涉河项目'
    24: '修建阻碍行洪的建筑物、构筑物'
    25: '临河房屋'
    26: '码头'
    27: '造（修）船厂'
    28: '光伏电厂'
    29: '砖瓦窑厂'
    30: '大棚'
    31: '桥梁'
    32: '在建桥梁'
    33: '拦河闸坝'
    34: '在建拦河闸坝'
    35: '其他建（构）筑物'
  # names:
  #   0: "Water Bodies"
  #   1: "Vegetation"
  #   2: "Mining Area"
  #   3: "Debris"
  #   4: "Industrial Buildings"
  #   5: "Waterway Facilities"
  #   6: "Hydraulic Controls"
  #   7: "Residences"
  #   8: "Sheds"
  #   9: "Storage Zones"
  #   10: "Recreation Areas"

# 目标跟踪配置（推理阶段去重 - 延迟保存策略）
tracking:
  # 是否启用目标跟踪去重（启用后同一目标只保存最优检测）
  enabled: true
  
  # 跟踪器类型:
  #   "bytetrack.yaml"          → 使用 ultralytics 内置默认参数（无需额外文件）
  #   "./config/bytetrack.yaml" → 使用项目本地自定义参数（可调参）
  #   "botsort.yaml"            → 使用 BoT-SORT 跟踪器（更精准，稍慢）
  tracker: "bytetrack.yaml"
  
  # 目标消失多少帧后认定为丢失并保存最优检测
  # 建议值: 离线模式 20-50，实时模式 30-60
  lost_threshold: 30
  
  # 边缘目标质量惩罚系数 (0.0-1.0)
  # 越小越不倾向保存画面边缘的不完整目标
  edge_penalty: 0.3
  
  # 最少出现帧数才保存（过滤闪现误检）
  min_track_frames: 3
  
  # 是否裁剪缓冲帧（true=只缓存目标区域，节省90%内存; false=缓存完整帧）
  # 注意: 如果 image_format 为 "full"（保存完整帧带标注），必须设为 false
  crop_buffer: false

# 批处理设置
batch:
  # 批处理大小 (实时模式建议设为1)
  size: 1
  
  # 是否启用批处理 (离线模式可以启用以提高速度)
  enabled: false

# 性能优化
optimization:
  # 是否使用TensorRT加速 (需要安装TensorRT)
  use_tensorrt: false
  
  # 是否使用ONNX Runtime (需要导出ONNX模型)
  use_onnx: false
  
  # 多线程数量
  num_threads: 4
